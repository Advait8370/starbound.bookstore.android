<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Starbound Reader</title>
<link rel="icon" type="image/png" href="images/favicon.ico">

<link rel="stylesheet" href="style.css">

<style>

:root{
  --bg:#050816;
  --surface:rgba(255,255,255,0.08);
  --border:rgba(255,255,255,0.08);
  --accent:#00d4ff;
  --text:#ffffff;
}

*{
  box-sizing:border-box;
}

body{
  margin:0;
  background:
    radial-gradient(circle at top,#10204f 0%,#050816 60%);
  color:var(--text);
  font-family:Inter, Arial, sans-serif;
  overflow:hidden;
}

/* Star background */

#stars{
  position:fixed;
  inset:0;
  z-index:0;
  pointer-events:none;
}

/* Reader */

.reader{
  position:relative;
  z-index:2;
  height:100vh;
  display:flex;
  flex-direction:column;
}

/* Header */

.reader-header{
  position:fixed;
  top:0;
  left:0;
  right:0;

  height:72px;

  display:flex;
  align-items:center;
  justify-content:space-between;

  padding:0 20px;

  background:rgba(5,8,22,0.45);

  backdrop-filter:blur(20px);

  border-bottom:1px solid var(--border);

  z-index:100;

  animation:slideDown .8s ease;
}

.reader-title{
  display:flex;
  flex-direction:column;
}

.reader-title h1{
  margin:0;
  font-size:18px;
  font-weight:700;
}

.reader-title span{
  font-size:13px;
  opacity:.7;
}

/* Controls */

.controls{
  display:flex;
  gap:10px;
}

.control-btn{

  width:44px;
  height:44px;

  border:none;

  border-radius:14px;

  background:rgba(255,255,255,0.08);

  color:white;

  font-size:18px;

  cursor:pointer;

  transition:
    transform .25s ease,
    background .25s ease,
    box-shadow .25s ease;

  backdrop-filter:blur(20px);

  box-shadow:
    0 8px 25px rgba(0,0,0,.3);
}

.control-btn:hover{
  transform:translateY(-2px) scale(1.05);
  background:rgba(255,255,255,0.14);
}

.control-btn:active{
  transform:scale(.92);
}

/* PDF Area */

#pdf-viewer{
  flex:1;

  overflow:auto;

  padding:
    110px 20px 120px;

  scroll-behavior:smooth;
}

.page-container{
  display:flex;
  justify-content:center;
  margin-bottom:30px;

  animation:
    fadeIn .7s ease,
    floatUp .6s ease;
}

canvas{

  max-width:100%;

  border-radius:24px;

  box-shadow:
    0 20px 60px rgba(0,0,0,.55);

  transition:
    transform .35s ease,
    box-shadow .35s ease;
}

canvas:hover{
  transform:scale(1.01);
}

/* Bottom Dock */

.bottom-dock{

  position:fixed;

  bottom:20px;
  left:50%;

  transform:translateX(-50%);

  display:flex;
  align-items:center;
  gap:14px;

  padding:14px 20px;

  background:rgba(255,255,255,0.08);

  backdrop-filter:blur(24px);

  border:1px solid rgba(255,255,255,0.08);

  border-radius:30px;

  z-index:100;

  box-shadow:
    0 12px 40px rgba(0,0,0,.4);

  animation:slideUp .8s ease;
}

/* Page Info */

.page-info{
  font-size:14px;
  opacity:.8;
  min-width:90px;
  text-align:center;
}

/* Loading */

.loader{
  position:fixed;
  inset:0;

  display:flex;
  align-items:center;
  justify-content:center;

  background:#050816;

  z-index:9999;

  transition:opacity .8s ease;
}

.loader-ring{

  width:60px;
  height:60px;

  border-radius:50%;

  border:4px solid rgba(255,255,255,0.15);

  border-top:4px solid var(--accent);

  animation:spin 1s linear infinite;
}

/* Animations */

@keyframes spin{
  to{
    transform:rotate(360deg);
  }
}

@keyframes slideDown{
  from{
    opacity:0;
    transform:translateY(-40px);
  }
  to{
    opacity:1;
    transform:translateY(0);
  }
}

@keyframes slideUp{
  from{
    opacity:0;
    transform:
      translateX(-50%)
      translateY(40px);
  }
  to{
    opacity:1;
    transform:
      translateX(-50%)
      translateY(0);
  }
}

@keyframes fadeIn{
  from{
    opacity:0;
  }
  to{
    opacity:1;
  }
}

@keyframes floatUp{
  from{
    opacity:0;
    transform:translateY(40px);
  }
  to{
    opacity:1;
    transform:translateY(0);
  }
}

/* Mobile */

@media(max-width:768px){

  .reader-header{
    height:66px;
    padding:0 14px;
  }

  .reader-title h1{
    font-size:15px;
  }

  .controls{
    gap:6px;
  }

  .control-btn{
    width:40px;
    height:40px;
    font-size:16px;
  }

  .bottom-dock{
    width:95%;
    justify-content:center;
  }

  canvas{
    border-radius:18px;
  }
}

</style>
</head>

<body>

<canvas id="stars"></canvas>

<div class="loader" id="loader">
  <div class="loader-ring"></div>
</div>

<div class="reader">

  <header class="reader-header">

    <div class="reader-title">
      <h1 id="book-title">
        Loading...
      </h1>

      <span>
        Starbound Stories Reader
      </span>
    </div>

    <div class="controls">

      <button class="control-btn" id="fullscreen">
        ⛶
      </button>

    </div>

  </header>

  <main id="pdf-viewer"></main>

  <div class="bottom-dock">

    <button class="control-btn" id="prev">
      ←
    </button>

    <button class="control-btn" id="zoom-out">
      −
    </button>

    <div class="page-info">
      <span id="page-num">1</span>
      /
      <span id="page-count">1</span>
    </div>

    <button class="control-btn" id="zoom-in">
      +
    </button>

    <button class="control-btn" id="next">
      →
    </button>

  </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="reader.js"></script>

</body>
</html>
