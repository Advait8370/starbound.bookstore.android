<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Starbound Reader</title>

<link
rel="icon"
type="image/png"
href="images/favicon.ico">

<link
rel="stylesheet"
href="style.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<style>

:root{
    --bg:#050816;
    --surface:rgba(255,255,255,.08);
    --border:rgba(255,255,255,.08);
    --accent:#00d4ff;
    --text:#fff;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
}

body{

    background:
    radial-gradient(
        circle at top,
        #10204f 0%,
        #050816 65%
    );

    color:var(--text);

    font-family:
    Inter,
    Arial,
    sans-serif;

    overflow:hidden;

}

/* -----------------
   Stars
------------------*/

#stars{

    position:fixed;

    inset:0;

    z-index:0;

    pointer-events:none;

}

/* -----------------
   Loader
------------------*/

.loader{

    position:fixed;

    inset:0;

    display:flex;

    justify-content:center;

    align-items:center;

    background:#050816;

    z-index:9999;

    transition:.8s;

}

.loader-ring{

    width:60px;

    height:60px;

    border-radius:50%;

    border:4px solid
    rgba(255,255,255,.15);

    border-top:4px solid
    var(--accent);

    animation:spin 1s linear infinite;

}

@keyframes spin{

    to{
        transform:
        rotate(360deg);
    }

}

/* -----------------
   Reader
------------------*/

.reader{

    position:relative;

    z-index:2;

    height:100vh;

    display:flex;

    flex-direction:column;

}

/* -----------------
   Header
------------------*/

.reader-header{

    position:fixed;

    top:0;

    left:0;

    right:0;

    height:70px;

    display:flex;

    justify-content:space-between;

    align-items:center;

    padding:0 18px;

    background:
    rgba(5,8,22,.5);

    backdrop-filter:
    blur(18px);

    border-bottom:
    1px solid
    rgba(255,255,255,.08);

    z-index:100;

}

.reader-title{

    overflow:hidden;

}

.reader-title h1{

    font-size:18px;

    white-space:nowrap;

    overflow:hidden;

    text-overflow:ellipsis;

}

.reader-title span{

    font-size:12px;

    opacity:.7;

}

/* -----------------
   Buttons
------------------*/

.controls{

    display:flex;

    gap:8px;

}

.control-btn{

    width:44px;

    height:44px;

    border:none;

    border-radius:14px;

    background:
    rgba(255,255,255,.08);

    color:white;

    font-size:18px;

    cursor:pointer;

    transition:.25s;

    backdrop-filter:
    blur(20px);

}

.control-btn:hover{

    background:
    rgba(255,255,255,.14);

    transform:
    scale(1.05);

}

.control-btn:active{

    transform:
    scale(.92);

}

/* -----------------
   Viewer
------------------*/

#pdf-viewer{

    flex:1;

    overflow:auto;

    padding:
    95px
    12px
    110px;

    scroll-behavior:
    smooth;

}

.page-container{

    display:flex;

    justify-content:center;

    margin-bottom:25px;

    animation:
    fadeIn .4s ease;

}

canvas{

    max-width:100%;

    height:auto;

    border-radius:18px;

    background:white;

    box-shadow:
    0 20px 60px
    rgba(0,0,0,.45);

}

@keyframes fadeIn{

    from{

        opacity:0;

        transform:
        translateY(20px);

    }

    to{

        opacity:1;

        transform:
        translateY(0);

    }

}

/* -----------------
   Bottom Dock
------------------*/

.bottom-dock{

    position:fixed;

    bottom:18px;

    left:50%;

    transform:
    translateX(-50%);

    display:flex;

    align-items:center;

    gap:10px;

    padding:
    12px
    16px;

    border-radius:28px;

    background:
    rgba(255,255,255,.08);

    backdrop-filter:
    blur(20px);

    border:
    1px solid
    rgba(255,255,255,.08);

    z-index:100;

}

.page-info{

    min-width:90px;

    text-align:center;

    font-size:14px;

}

/* -----------------
   Mobile
------------------*/

@media(max-width:768px){

.reader-header{

    height:64px;

    padding:0 12px;

}

.reader-title h1{

    font-size:15px;

}

.control-btn{

    width:40px;

    height:40px;

    font-size:16px;

}

.bottom-dock{

    width:95%;

    justify-content:center;

    gap:6px;

}

.page-info{

    min-width:70px;

}

}

</style>

</head>

<body>

<canvas id="stars"></canvas>

<div
class="loader"
id="loader">

<div
class="loader-ring">
</div>

</div>

<div
class="reader">

<header
class="reader-header">

<div
class="reader-title">

<h1
id="book-title">

Loading...

</h1>

<span>

Starbound Stories Reader

</span>

</div>

<div
class="controls">

<button
class="control-btn"
id="back-btn">

←

</button>

<button
class="control-btn"
id="fullscreen">

⛶

</button>

</div>

</header>

<main
id="pdf-viewer">

</main>

<div
class="bottom-dock">

<button
class="control-btn"
id="prev">

←

</button>

<button
class="control-btn"
id="zoom-out">

−

</button>

<div
class="page-info">

<span
id="page-num">

1

</span>

/

<span
id="page-count">

1

</span>

</div>

<button
class="control-btn"
id="zoom-in">

+

</button>

<button
class="control-btn"
id="next">

→

</button>

</div>

</div>

<script src="reader.js"></script>

<script>

document
.getElementById(
"back-btn"
)
.onclick=()=>{

history.back();

};

</script>

</body>

</html>
